services:

  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: clientesdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak-server
    restart: always
    depends_on:
      - postgres
    ports:
      - "8082:8080"  # Porta externa 8081 para acessar Keycloak (ex.: http://localhost:8081)
    environment:
      KEYCLOAK_ADMIN: admin  # Usuário admin do Keycloak
      KEYCLOAK_ADMIN_PASSWORD: admin  # Senha admin (mude em produção!)
      KC_DB: postgres  # Usa PostgreSQL como banco
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb  # Banco dedicado para Keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HOSTNAME_STRICT: false  # Desabilita verificação de hostname para desenvolvimento
      KC_HTTP_ENABLED: true  # Habilita HTTP (não use em produção)
    command:
      - start-dev  # Modo desenvolvimento (rápido, sem otimização)
      - --import-realm  # Importa configuração do realm na inicialização
    volumes:
      - ./keycloak-export:/opt/keycloak/data/import/  # Importa configuração do realm

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-broker
    restart: always
    ports:
      - "5672:5672"  # Porta para conexões AMQP
      - "15672:15672"  # Porta para interface de gerenciamento
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: quarkus-app
    depends_on:
      - postgres
      - redis
      - keycloak
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/clientesdb
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
      QUARKUS_REDIS_HOSTS: redis:6379

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data: